<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CHANGE Group Logo</title>
  <desc id="desc">Logo for the CHANGE research group, combining climate, health, air quality, and next-generation environmental science themes.</desc>
  <defs>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#183f66"/>
      <stop offset="55%" stop-color="#245a8d"/>
      <stop offset="100%" stop-color="#7fb7d4"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f1fa"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1f2933" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="44" fill="#ffffff"/>
  <rect x="28" y="28" width="1144" height="304" rx="34" fill="url(#softBlue)" stroke="#dce7f1"/>

  <g transform="translate(88 64)" filter="url(#shadow)">
    <circle cx="116" cy="116" r="104" fill="#ffffff" stroke="#dce7f1" stroke-width="2"/>
    <circle cx="116" cy="116" r="82" fill="#f7fbff"/>

    <path d="M45 124 C74 76, 129 56, 187 76" fill="none" stroke="#245a8d" stroke-width="13" stroke-linecap="round"/>
    <path d="M54 150 C88 194, 151 198, 190 150" fill="none" stroke="#7fb7d4" stroke-width="13" stroke-linecap="round"/>
    <path d="M76 92 C108 116, 128 141, 145 188" fill="none" stroke="#183f66" stroke-width="10" stroke-linecap="round" opacity="0.95"/>

    <circle cx="68" cy="126" r="10" fill="#245a8d"/>
    <circle cx="116" cy="78" r="9" fill="#7fb7d4"/>
    <circle cx="178" cy="105" r="10" fill="#245a8d"/>
    <circle cx="156" cy="175" r="9" fill="#183f66"/>
    <circle cx="88" cy="181" r="8" fill="#7fb7d4"/>

    <path d="M116 48 C132 55, 143 69, 146 87 C130 84, 116 73, 110 57 C109 53, 111 49, 116 48Z" fill="#7fb7d4" opacity="0.95"/>
    <path d="M186 151 C203 153, 217 164, 224 180 C208 183, 191 176, 181 162 C178 157, 181 152, 186 151Z" fill="#245a8d" opacity="0.9"/>
  </g>

  <g transform="translate(310 90)">
    <text x="0" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="800" letter-spacing="3" fill="#183f66">CHANGE</text>
    <rect x="4" y="112" width="332" height="7" rx="4" fill="url(#blueGradient)"/>
    <text x="0" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#245a8d">Climate, Health, and Air Quality</text>
    <text x="0" y="204" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#5f6f83">for Next Generation Environmental Science</text>
  </g>

  <g transform="translate(910 92)" opacity="0.95">
    <circle cx="0" cy="0" r="5" fill="#7fb7d4"/>
    <circle cx="58" cy="28" r="7" fill="#245a8d"/>
    <circle cx="110" cy="-2" r="5" fill="#183f66"/>
    <circle cx="150" cy="54" r="6" fill="#7fb7d4"/>
    <path d="M0 0 L58 28 L110 -2 L150 54" fill="none" stroke="#b8cde0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(925 228)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#183f66">ATMOSPHERIC CHEMISTRY</text>
    <text x="0" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#245a8d">ENVIRONMENTAL HEALTH</text>
    <text x="0" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#5f6f83">DATA-DRIVEN SCIENCE</text>
  </g>
</svg>
