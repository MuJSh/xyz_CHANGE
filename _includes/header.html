<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}" style="display: flex; align-items: center; gap: 14px; color: inherit; text-decoration: none;">
      <img class="sdu-header-logo" src="{{ '/assets/img/news/sdulogo.png' | relative_url }}" alt="Shandong University logo" style="display: block; height: 42px; width: auto; max-width: 220px; object-fit: contain;">
      <span class="site-title">
        <span>{{ site.title }}</span>
        <small>{{ site.subtitle }}</small>
      </span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
