<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}" style="display: flex; align-items: center; gap: 14px; color: inherit; text-decoration: none;">
      <span class="brand-logo-frame" style="display: inline-flex; align-items: center; justify-content: center; height: 46px; min-width: 120px; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 14px; background: linear-gradient(135deg, #ffffff 0%, #f3f8fc 100%); box-shadow: 0 8px 22px rgba(31, 41, 51, 0.06);">
        <img class="sdu-header-logo" src="{{ '/assets/img/news/sdulogo.png' | relative_url }}" alt="Shandong University logo" style="display: block; width: 108px; height: auto; max-height: 26px; object-fit: contain;">
      </span>
      <span class="site-title" style="position: relative; padding-left: 15px; border-left: 1px solid #d7e1ec;">
        <span style="display: flex; align-items: center; gap: 9px; font-size: 1.04rem; font-weight: 800; letter-spacing: 0.01em; color: #1f2933;">
          XYZ-CHANGE Group
          <span aria-hidden="true" style="display: inline-block; width: 34px; height: 3px; border-radius: 999px; background: linear-gradient(90deg, #245a8d 0%, #7fb7d4 100%);"></span>
        </span>
        <small style="margin-top: 2px; color: #5f6f83; font-weight: 650; letter-spacing: 0.01em;">Climate, Health, and Air Quality for Next Generation</small>
      </span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
